name: Dependency Audit

on:
  push:
    branches: [ UAI-Development ]
  schedule:
    - cron: '0 3 * * 0' # weekly on Sunday at 03:00 UTC

jobs:
  audit:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Run npm audit
        run: |
          echo "Running npm audit (fail on high)"
          npm audit --audit-level=high || (echo "Vulnerabilities found" && exit 1)

      - name: Create issue on audit failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const repo = context.repo;
            const body = `Automated dependency audit found vulnerabilities on branch ${process.env.GITHUB_REF} — please triage.`;
            await github.issues.create({ owner: repo.owner, repo: repo.repo, title: 'Dependency audit: vulnerabilities found', body });
