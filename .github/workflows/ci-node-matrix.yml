name: CI - Node Matrix

on:
  pull_request:
  push:
    branches: [ UAI-Development, main ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-npm-20-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-20-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Run smoke tests
        run: npm run test:smoke -- --ci --runInBand

  test:
    needs: smoke
    runs-on: ubuntu-latest
      strategy:
      matrix:
        node-version: [20, 24]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-npm-${{ matrix.node-version }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-${{ matrix.node-version }}-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --ci --runInBand
