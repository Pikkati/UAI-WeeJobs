name: CI (Dockerized tests)

on:
  push:
    branches: [ main, chore/*, feat/* ]
  pull_request:
    branches: [ main ]

jobs:
  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-cache-${{ matrix.node }}-${{ hashFiles('**/package-lock.json') }}

      - name: Set up QEMU (for Docker builds)
        uses: docker/setup-qemu-action@v2

      - name: Build test image
        run: |
          docker build --build-arg NODE_VERSION=${{ matrix.node }} -t weejobs-test:node${{ matrix.node }} .

      - name: Run tests inside container
        run: |
          docker run --rm -v ${{ github.workspace }}:/usr/src/app -w /usr/src/app weejobs-test:node${{ matrix.node }}

  smoke:
    runs-on: ubuntu-latest
    needs: test-matrix
    steps:
      - uses: actions/checkout@v4
      - name: Smoke: npm ci + test (with retry fallback)
        run: |
          npm ci --legacy-peer-deps --no-audit --no-fund
          npm run test:ci:retry || npm test -- --ci --runInBand

      - name: Coverage and upload
        run: |
          npm test -- --coverage --ci --runInBand || true
        continue-on-error: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
