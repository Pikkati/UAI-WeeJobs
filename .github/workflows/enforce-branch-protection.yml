name: Enforce Branch Protection

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  administration: write

jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce branch protection via API
        uses: actions/github-script@v6
        with:
          script: |
            const { owner, repo } = context.repo;
            // Branches to protect; adjust as needed
            const branches = ['UAI-Development', 'main'];
            // CI job names present in this repo's workflows
            const requiredContexts = ['build', 'windows-test'];

            for (const branch of branches) {
              await github.request('PUT /repos/{owner}/{repo}/branches/{branch}/protection', {
                owner,
                repo,
                branch,
                required_status_checks: {
                  strict: true,
                  contexts: requiredContexts
                },
                enforce_admins: true,
                required_pull_request_reviews: {
                  dismissal_restrictions: { users: [], teams: [] },
                  dismiss_stale_reviews: true,
                  require_code_owner_reviews: true,
                  required_approving_review_count: 1
                },
                restrictions: { users: [], teams: [], apps: [] }
              });
              console.log(`Branch protection updated for ${branch}`);
            }
