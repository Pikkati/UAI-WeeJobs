name: CI

on:
  push:
    branches: [UAI-Development]
  pull_request:
    branches: [UAI-Development]

jobs:
  build:
    strategy:
      matrix:
        os: [[self-hosted, macOS, X64]]
    runs-on: ${{ matrix.os }}
    env:
      USE_TEST_Q: 'false'
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Restore node modules cache (explicit)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install dependencies (deterministic `npm ci` with retries)
        run: |
          echo "Installing dependencies with npm ci"
          for i in 1 2 3; do
            npm ci --legacy-peer-deps --no-audit --no-fund && break || (echo "npm ci failed, retrying ($i)"; sleep 5)
          done
        env:
          CI: true
      - name: Run TypeScript
        run: npx tsc --noEmit
      - name: Run ESLint
        run: npx eslint "app/**" "components/**" "context/**" "lib/**" --ext .ts,.tsx
      - name: Run tests
        run: |
          if [ "$USE_TEST_Q" = 'true' ]; then
            echo "Using test:q to run tests (auto-quit watch mode)"
            npm run test:q -- --ci --passWithNoTests
          else
            npm test -- --ci --passWithNoTests
          fi
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      - name: Run coverage (best-effort)
        run: |
          npm test -- --coverage --ci --runInBand || true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage

      - name: Upload coverage to Codecov
        if: ${{ secrets.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  windows-test:
    runs-on: [self-hosted, windows]
    env:
      USE_TEST_Q: 'false'
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Restore node modules cache (explicit)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install dependencies (deterministic `npm ci` with retries)
        run: |
          echo "Installing dependencies with npm ci"
          for ($i = 1; $i -le 3; $i++) {
            npm ci --legacy-peer-deps --no-audit --no-fund && break
            Write-Host "npm ci failed, retrying ($i)"
            Start-Sleep -Seconds 5
          }
        env:
          CI: true
        shell: pwsh
      - name: Run TypeScript
        run: npx tsc --noEmit
        shell: pwsh
      - name: Run ESLint
        run: npx eslint "app/**" "components/**" "context/**" "lib/**" --ext .ts,.tsx
        shell: pwsh
      - name: Run tests
        run: |
          if ($env:USE_TEST_Q -eq 'true') {
            Write-Host "Using test:q to run tests (auto-quit watch mode)"
            npm run test:q -- --ci --passWithNoTests
          } else {
            npm test -- --ci --passWithNoTests
          }
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        shell: pwsh
      - name: Run coverage (best-effort)
        run: npm test -- --coverage --ci --runInBand || true
        shell: pwsh

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
        if-no-files-found: warn
        shell: pwsh

      - name: Upload coverage to Codecov
        if: ${{ secrets.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
        shell: pwsh
