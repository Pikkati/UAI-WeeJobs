name: Auto-close stale issues

on:
  schedule:
    - cron: '0 3 * * 0' # weekly on Sunday at 03:00 UTC
  workflow_dispatch: {}

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run stale action
        uses: actions/stale@v4
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 60
          days-before-close: 14
          stale-issue-message: "This issue has been automatically marked as stale due to inactivity. Please update or comment to keep it open."
          close-issue-message: "Closing this issue due to prolonged inactivity. Please reopen or comment if this is still relevant."
          operations-per-run: 50
