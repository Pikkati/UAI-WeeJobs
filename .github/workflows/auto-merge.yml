name: Auto Merge Approved Remediation PRs

on:
  pull_request:
    types: [labeled]

jobs:
  automerge:
    if: contains(github.event.pull_request.labels.*.name, 'automerge')
    runs-on: ubuntu-latest
    steps:
      - name: Wait for checks
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const checks = await github.checks.listForRef({ owner, repo, ref: pr.head.sha });
            const allSuccess = checks.data.check_runs.every(c => c.conclusion === 'success');
            if (!allSuccess) throw new Error('Not all checks are successful yet.');
      - name: Merge PR
        uses: pascalgn/ghaction-merge@v4
        with:
          method: merge
          merge_message: 'Auto-merged by CI after checks passed and label present.'
